kind = "web"
previewPath = "/"
title = "GiftEase"
version = "1.0.0"
id = "artifacts/giftease"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19799

[services.development]
run = "pnpm --filter @workspace/giftease run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/giftease", "run", "build" ]
publicDir = "artifacts/giftease/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19799"
BASE_PATH = "/"
